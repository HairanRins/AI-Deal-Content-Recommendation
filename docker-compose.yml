services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_LOG_LEVEL=info
      - WEBHOOK_URL=https://your-n8n-instance.com
      - NODE_ENV=${NODE_ENV:-production}
      - CASE_STUDIES_API_URL=${CASE_STUDIES_API_URL}
      - WHITEPAPERS_API_URL=${WHITEPAPERS_API_URL}
      - FALLBACK_CONTENT_URL=${FALLBACK_CONTENT_URL}
      - LOG_API_URL=${LOG_API_URL}
      - ERROR_LOG_API_URL=${ERROR_LOG_API_URL}
      - ALERT_EMAIL=${ALERT_EMAIL}
    volumes:
      - ./n8n_data:/home/node/.n8n
    env_file:
      - .env
